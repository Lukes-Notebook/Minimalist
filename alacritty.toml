#--Window Padding
[window.padding]
x = 10
y = 10

# ── Cursor & Selection Colours ───────────────────────────────────────────
[colors.cursor]
cursor = "#d6d6d6"
text   = "#e7e7e7"

[colors.selection]
text       = "#e7e7e7"
background = "#3e4451"

# ── Primary Colours ───────────────────────────────────────────────────────
[colors.primary]
background = "#1e1e1e"
foreground = "#cccccc"

# ── Normal Palette (ANSI) ────────────────────────────────────────────────
[colors.normal]
black   = "#2e3440"
red     = "#e06c75"
green   = "#9cdef2"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#9cdef2"
white   = "#828997"

# ── Font Settings ────────────────────────────────────────────────────────
[font]
size = 11.0

[font.bold]
family = "Gohu GohuFont"
style  = "Bold"

[font.bold_italic]
family = "Gohu GohuFont"
style  = "Bold Italic"

[font.italic]
family = "Gohu GohuFont"
style  = "Italic"

[font.normal]
family = "Gohu GohuFont"
style  = "Regular"

# ── Mouse & Environment ───────────────────────────────────────────────────
[mouse]
hide_when_typing = true

[env]
TERM = "xterm-256color"